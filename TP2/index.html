<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Ma page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>
    <div class="vh-100 d-flex">

        <div
            class="w-50 bg-primary text-white d-flex flex-column justify-content-center align-items-center text-center">
            <img src="./img/ocsi_academy_logo.png" alt="Logo OCSI Academy" style="width: 100px;" class="mb-3">
            <h1>Bienvenue</h1>
            <p>Connectez-vous pour accéder à l'application</p>
        </div>
        <div class="w-50 d-flex justify-content-center align-items-center">
            <form action="liste.html" method="post" style="width: 300px;">

                <div class="mb-3">
                    <label for="username" class="form-label">Login</label>
                    <input type="text" autocomplete="off" id="username" name="username" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Mot de passe</label>
                    <input type="password" autocomplete="off" id="password" name="password" class="form-control"
                        required>
                </div>

                <button type="submit" class="btn btn-primary">Connexion</button>
            </form>
        </div>

    </div>
</body>

</html>
